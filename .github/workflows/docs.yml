name: docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"
      - run: pip install zensical jupyter nbconvert
      - name: Build notebook tutorials
        run: |
          mkdir -p docs/tutorials
          for nb in examples/dem_contour.ipynb examples/cdl_tiled_polygonize.ipynb; do
            jupyter nbconvert \
              --to markdown \
              --execute \
              --ExecutePreprocessor.timeout=1200 \
              --TagRemovePreprocessor.enabled=True \
              --TagRemovePreprocessor.remove_cell_tags='["skip_ci"]' \
              --output-dir docs/tutorials \
              "$nb"
          done
      - run: zensical build --clean
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
