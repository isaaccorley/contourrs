name: docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.8.2

      - uses: astral-sh/setup-uv@v7.3.1

      - name: Build and install contourrs
        run: uv run --python 3.13 --extra all --with maturin maturin develop --release

      - name: Build notebook tutorials
        run: |
          mkdir -p docs/tutorials
          for nb in examples/quickstart.ipynb examples/dem_contour.ipynb examples/cdl_tiled_polygonize.ipynb; do
            uv run --python 3.13 --extra all jupyter nbconvert \
              --to markdown \
              --execute \
              --ExecutePreprocessor.timeout=1200 \
              --TagRemovePreprocessor.enabled=True \
              --TagRemovePreprocessor.remove_cell_tags='["skip_ci"]' \
              --output-dir docs/tutorials \
              "$nb"
          done
          # torchgeo notebook requires torch+torchgeo; convert without executing
          uv run --python 3.13 --extra all jupyter nbconvert \
            --to markdown \
            --output-dir docs/tutorials \
            examples/torchgeo_ftw_polygonize.ipynb

      - run: uv run --python 3.13 --with zensical zensical build --clean
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
