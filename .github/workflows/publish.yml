name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists; skipping creation."
          else
            gh release create "${{ github.ref_name }}" --generate-notes
          fi

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1.50.1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheels (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64
          # macOS arm64
          - os: macos-latest
            target: aarch64
          # Windows x86_64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.50.1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.12 3.13 3.14
          manylinux: auto

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.13
        with:
          packages-dir: dist/
          skip-existing: true
