name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --features contourrs-core/arrow -- -D warnings

      - name: Test core
        run: cargo test -p contourrs-core

      - name: Test core (arrow feature)
        run: cargo test -p contourrs-core --features arrow

  python:
    name: Python tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Build and install
        run: uv run --python ${{ matrix.python-version }} --extra test --with maturin maturin develop --release

      - name: Run comparison tests
        run: uv run --python ${{ matrix.python-version }} --extra test pytest tests/ -v

  examples:
    name: Example notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Build and install
        run: uv run --python 3.13 --extra dev --with maturin maturin develop --release

      - name: Run notebooks
        run: |
          for nb in examples/*.ipynb; do
            echo "Running $nb"
            uv run --python 3.13 --extra dev jupyter nbconvert --to script --stdout "$nb" | uv run --python 3.13 --extra dev python
          done
