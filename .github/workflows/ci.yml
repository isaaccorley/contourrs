name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-pr-title:
    name: Validate PR title
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            build
            ci
            chore
            docs
            style
            perf
            test

  rust:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --features contourrs/arrow -- -D warnings

      - name: Test core
        run: cargo test -p contourrs

      - name: Test core (arrow feature)
        run: cargo test -p contourrs --features arrow

  python:
    name: Python tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Build and install
        run: uv run --python ${{ matrix.python-version }} --with maturin --with pytest maturin develop --release

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} --with pytest pytest tests/ -v

  examples:
    name: Example notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Build and install
        run: uv run --python 3.13 --extra dev --with maturin maturin develop --release

      - name: Run notebooks
        run: |
          for nb in examples/*.ipynb; do
            echo "Running $nb"
            uv run --python 3.13 --extra dev jupyter nbconvert --to script --stdout "$nb" | uv run --python 3.13 --extra dev python
          done
