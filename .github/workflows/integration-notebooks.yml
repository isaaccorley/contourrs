name: Integration Notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  notebooks:
    name: Run integration notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v5

      - name: Build and install
        run: uv run --python 3.13 --extra all --with maturin maturin develop --release

      - name: Execute and convert notebooks
        run: |
          mkdir -p /tmp/tutorial-notebooks

          for nb in examples/quickstart.ipynb examples/dem_contour.ipynb examples/cdl_tiled_polygonize.ipynb; do
            echo "Executing + converting $nb"
            uv run --python 3.13 --extra all jupyter nbconvert \
              --to markdown \
              --execute \
              --ExecutePreprocessor.timeout=1200 \
              --TagRemovePreprocessor.enabled=True \
              --TagRemovePreprocessor.remove_cell_tags='["skip_ci"]' \
              --output-dir /tmp/tutorial-notebooks \
              "$nb"
          done
