site_name: contourrs
site_url: https://isaac.earth/contourrs/
site_description: Fast raster polygonization and contouring in Rust with Python bindings
repo_url: https://github.com/isaaccorley/contourrs
repo_name: isaaccorley/contourrs

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api.md
  - Performance: performance.md
  - Architecture: architecture.md
  - Examples:
      - Overview: examples.md
      - Quickstart: tutorials/quickstart.md
      - DEM Contours: tutorials/dem_contour.md
      - Tiled CDL Polygonization: tutorials/cdl_tiled_polygonize.md
      - TorchGeo FTW Polygonize: tutorials/torchgeo_ftw_polygonize.md
